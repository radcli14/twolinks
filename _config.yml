# Feature List                            Edit, add or remove features to be presented.
features                                  :

  - title                                 : Interactive 3D Simulation
    description                           : Real-time physical simulation of a chaotic two-link pendulum rendered in beautiful, high-fidelity 3D space.
    fontawesome_icon_name                 : sync

  - title                                 : Customizable Link Dimensions
    description                           : Fine-tune the length, hinge offset, center of mass, and pivot points of both links to witness various chaotic movements.
    fontawesome_icon_name                 : sliders-h
    
  - title                                 : Dynamic Color Selection
    description                           : Personalize the appearance of each link with an interactive and responsive color picker.
    fontawesome_icon_name                 : palette

  - title                                 : Immediate State Controls
    description                           : Pause, play, reset, or shuffle physical properties instantly to control the chaotic pendulum behavior in real-time.
    fontawesome_icon_name                 : play-circle

  - title                                 : Premium KMP Architecture
    description                           : Powered by Google's Filament rendering engine and Kotlin Multiplatform for buttery-smooth 60 FPS across Web and mobile.
    fontawesome_icon_name                 : bolt

  - title                                 : Educational & Fun
    description                           : Perfect for students, engineers, and scientists wanting to explore multi-body system dynamics and chaotic mechanics.
    fontawesome_icon_name                 : graduation-cap

